<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký Tài khoản E-Commerce</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; padding: 20px; }
        form { max-width: 600px; margin: auto; }
        fieldset { margin-bottom: 20px; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        legend { font-weight: bold; padding: 0 10px; }
        div { margin-bottom: 10px; }
        label { display: inline-block; width: 150px; }
        input, select, textarea { width: calc(100% - 160px); padding: 5px; }
        input[type="radio"], input[type="checkbox"] { width: auto; margin-right: 5px; }
        .buttons { text-align: center; margin-top: 20px; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

    <form action="#" method="POST">
        <h2>Đăng ký Tài khoản</h2>

        <!-- Fieldset 1: Thông tin cá nhân -->
        <fieldset>
            <legend>Thông tin cá nhân</legend>
            <div>
                <label for="fullname">Họ tên:</label>
                <input type="text" >
            </div>
            <div>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required placeholder="example@gmail.com">
            </div>
            <div>   
                <label for = "congviec"> Công Việc</label>
                <input type="text" >
            </div>
            </div>
            <div>
                <label for="phone">Số điện thoại:</label>
                <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" placeholder="Nhập 10 chữ số">
            </div>
            <div>
                <label for="dob">Ngày sinh:</label>
                <!-- Max là ngày 05/05/2026 dựa trên thời gian hiện tại -->
                <input type="date" id="dob" name="dob" max="2026-05-05">
            </div>
        </fieldset>

        <!-- Fieldset 2: Tài khoản -->
        <fieldset>
            <legend>Tài khoản</legend>
            <div>
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" pattern="^[A-Za-z0-9_]{3,20}$" placeholder="3-20 ký tự (chữ, số, _)">
            </div>
            <div>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" minlength="8" pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}" placeholder="Ít nhất 1 chữ hoa + 1 số">
            </div>
            <div>
                <label for="confirm_password">Xác nhận password:</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Nhập lại mật khẩu">
            </div>
        </fieldset>

        <!-- Fieldset 3: Thông tin giao hàng -->
        <fieldset>
            <legend>Thông tin giao hàng</legend>
            <div>
                <label for="city">Thành phố:</label>
                <select id="city" name="city">
                    <option value="">--Chọn tỉnh/thành--</option>
                    <option value="hanoi">Hà Nội</option>
                    <option value="hcm">TP. Hồ Chí Minh</option>
                    <option value="danang">Đà Nẵng</option>
                    <option value="haiphong">Hải Phòng</option>
                    <option value="cantho">Cần Thơ</option>
                </select>
            </div>
            <div>
                <label for="district">Quận /Huyện:</label>
                <select id="district" name="district">
                    <option value="">--Chọn quận/huyện--</option>
                </select>
            </div>
            <div>
                <label for="address">Địa chỉ chi tiết:</label>
                <textarea id="address" name="address" rows="3" placeholder="Số nhà, tên đường..."></textarea>
            </div>
            <div>
                <label>Giới tính:</label>
                <input type="radio" id="male" name="gender" value="nam"> <label for="male" style="width:auto">Nam</label>
                <input type="radio" id="female" name="gender" value="nu"> <label for="female" style="width:auto">Nữ</label>
                <input type="radio" id="other" name="gender" value="khac"> <label for="other" style="width:auto">Khác</label>
            </div>
        </fieldset>

        <div>
            <input type="checkbox" id="terms" name="terms" required>
            <label for="terms" style="width:auto">Tôi đồng ý với các điều khoản</label>
        </div>

        <div class="buttons">
            <button type="submit">Đăng ký</button>
            <button type="reset">Làm mới</button>
        </div>
    </form>

</body>
</html>
