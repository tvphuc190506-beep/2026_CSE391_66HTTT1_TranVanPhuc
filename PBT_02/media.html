
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trang Multimedia - Giới thiệu sản phẩm</title>
</head>
<body>
    <h1>Sản Phẩm Công Nghệ   Mới</h1>

    <svg width="100" height="100" style="border:1px solid #ccc">
        <circle cx="50" cy="50" r="40" stroke="blue" stroke-width="3" fill="yellow" />
        <text x="32" y="55" fill="black" font-weight="bold">LOGO</text>
    </svg>

    <section>
        <h2>Bộ sưu tập sản phẩm</h2>
        
        <figure>
            <img src="https://picsum.photos/400/300?random=1" alt="Điện thoại thông minh thế hệ mới" loading="lazy" style="max-width: 100%; height: auto;">
            <figcaption>Hình 1: Điện thoại thông minh màn hình gập.</figcaption>
        </figure>

        <figure>
            <img src="https://picsum.photos/400/300?random=2" alt="Laptop mỏng nhẹ" loading="lazy" style="max-width: 100%; height: auto;">
            <figcaption>Hình 2: Laptop văn phòng hiệu năng cao.</figcaption>
        </figure>

        <figure>
            <img src="https://picsum.photos/400/300?random=3" alt="Tai nghe chống ồn" loading="lazy" style="max-width: 100%; height: auto;">
            <figcaption>Hình 3: Tai nghe không dây thế hệ mới.</figcaption>
        </figure>
    </section>

    <section>
        <h2>Video Review</h2>
        <iframe width="560" height="315" src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="YouTube video player" frameborder="0" allowfullscreen></iframe>
    </section>

    <section>
        <h2>Video Giới Thiệu Gốc</h2>
        <video controls width="600" poster="https://picsum.photos/600/400?grayscale">
            <source src="movie.mp4" type="video/mp4">
            <source src="movie.webm" type="video/webm">
            Trình duyệt của bạn không hỗ trợ thẻ video.
        </video>
    </section>

    <section>
        <h2>Nhạc nền giới thiệu</h2>
        <audio controls>
            <source src="background-music.mp3" type="audio/mpeg">
            Trình duyệt của bạn không hỗ trợ thẻ audio.
        </audio>
    </section>
</body>
</html>
