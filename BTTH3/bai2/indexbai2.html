<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý công việc</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Quản lý công việc cá nhân</h1>

    <div id="stats">
        <span>Tổng: <span id="total-tasks">0</span></span> |
        <span>Hoàn thành: <span id="completed-tasks">0</span></span> |
        <span>Chưa hoàn thành: <span id="pending-tasks">0</span></span>
    </div>

    <div id="message" class="hidden"></div>

    <button id="btn-open-form">Thêm công việc</button>

    <div id="task-list"></div>

    <div id="form-popup" class="hidden">
        <form id="task-form">
            <h2>Thông tin công việc</h2>
            <input type="hidden" id="task-id">
            
            <label>Tiêu đề:</label>
            <input type="text" id="title" required>
            
            <label>Mô tả ngắn:</label>
            <input type="text" id="desc" required>
            
            <label>Hạn hoàn thành:</label>
            <input type="date" id="date" required>
            
            <label>Mức ưu tiên:</label>
            <select id="priority">
                <option value="Thấp">Thấp</option>
                <option value="Trung bình">Trung bình</option>
                <option value="Cao">Cao</option>
            </select>
            
            <div class="form-actions">
                <button type="submit">Lưu</button>
                <button type="button" id="btn-close-form">Đóng</button>
            </div>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
