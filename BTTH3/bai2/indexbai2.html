<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý công việc</title>
    <link rel="stylesheet" href="stylebai2.css"> </head>
<body>
    <div class="container">
        <h1>Quản lý công việc</h1>

        <div id="stats">
            <div class="stat-box">
                <span class="stat-label">Tổng</span>
                <span id="total-tasks" class="stat-value">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Đã xong</span>
                <span id="completed-tasks" class="stat-value text-success">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Còn lại</span>
                <span id="pending-tasks" class="stat-value text-danger">0</span>
            </div>
        </div>

        <div id="message" class="hidden"></div>

        <button id="btn-open-form" class="btn btn-primary">
            + Thêm công việc mới
        </button>

        <div id="task-list">
            </div>
    </div>

    <div id="form-popup" class="overlay hidden">
        <div class="modal">
            <form id="task-form">
                <h2>Thông tin công việc</h2>
                <input type="hidden" id="task-id">
                
                <div class="form-group">
                    <label>Tiêu đề:</label>
                    <input type="text" id="title" placeholder="Ví dụ: Học JavaScript..." required>
                </div>
                
                <div class="form-group">
                    <label>Mô tả ngắn:</label>
                    <input type="text" id="desc" placeholder="Mô tả chi tiết..." required>
                </div>
                
                <div class="form-group">
                    <label>Hạn hoàn thành:</label>
                    <input type="date" id="date" required>
                </div>
                
                <div class="form-group">
                    <label>Mức ưu tiên:</label>
                    <select id="priority">
                        <option value="Thấp">Thấp</option>
                        <option value="Trung bình" selected>Trung bình</option>
                        <option value="Cao">Cao</option>
                    </select>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-success">Lưu công việc</button>
                    <button type="button" id="btn-close-form" class="btn btn-secondary">Hủy bỏ</button>
                </div>
            </form>
        </div>
    </div>

    <script src="scriptbai2.js"></script> 
</body>
</html>
