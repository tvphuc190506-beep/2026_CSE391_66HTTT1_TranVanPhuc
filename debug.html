<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Trang web ShopTLU</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <header>
        <h1>Welcome to ShopTLU</h1>
        <nav>
            <ul>
                <li><a href="#home">Trang chủ</a></li>
                <li><a href="#products">Sản phẩm</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="products">
            <h3>Sản phẩm hot</h3>
            <article>
                <figure>
                    <img src="iphone.jpg" alt="Điện thoại iPhone 16 Pro">
                    <figcaption>iPhone 16 Pro</figcaption>
                </figure>
                <p>Giá: <b>25.990.000đ</b></p>
            </article>
        </section>

        <section id="info">
            <h3>Thông tin chi tiết</h3>
            <table border="1">
                <thead>
                    <tr>
                        <th>Tên</th>
                        <th>Giá</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>iPhone</td>
                        <td>25tr</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <aside>
        <p>Sidebar content</p>
    </aside>

    <footer>
        <p>&copy; Copyright 2026 - ShopTLU</p>
    </footer>
</body>
</html>
