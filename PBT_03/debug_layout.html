<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Debug Layout C1</title>
    <link rel="stylesheet" href="debug_layout.css">
</head>
<body>

    <h1>Cách 1: Sửa bằng border-box</h1>
    <div class="container">
        <div class="sidebar fix-box-sizing">Sidebar (border-box)</div>
        <div class="content fix-box-sizing">Content (border-box)</div>
    </div>

    <h1 style="clear: both; padding-top: 30px;">Cách 2: Sửa bằng cách trừ bớt width</h1>
    <div class="container">
        <div class="sidebar fix-width">Sidebar (trừ width)</div>
        <div class="content fix-width">Content (trừ width)</div>
    </div>

</body>
</html>
