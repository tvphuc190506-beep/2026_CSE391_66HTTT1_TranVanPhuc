<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài B2 - CSS Transitions & Animations</title>
    <link rel="stylesheet" href="animations.css">
</head>
<body>

    <div class="animation-container">
        <h2>Khu vườn Hiệu ứng Chuyển động (Animations)</h2>
        
        <div class="card-wrapper">
            
            <div class="anim-card">
                <div class="image-box">
                    <img src="https://via.placeholder.com/300x200" alt="Demo">
                </div>
                <div class="info">
                    <h4>Sản phẩm chuyển động mẫu</h4>
                    <p>Hãy rê chuột (hover) vào card này để xem combo hiệu ứng biến đổi diễn ra cực mượt.</p>
                    <button class="btn-anim">Mua ngay</button>
                </div>
            </div>

        </div>

        <div class="extra-animations">
            
            <div class="spinner-section">
                <p>4. Loading Spinner trạng thái:</p>
                <div class="loading-spinner"></div>
            </div>

            <div class="fade-section">
                <p>5. Fade-in khi scroll/load trang web:</p>
                <div class="fade-in-box">Chào bạn Phục! Tôi tự động trượt lên từ từ.</div>
            </div>

        </div>
    </div>

</body>
</html>
