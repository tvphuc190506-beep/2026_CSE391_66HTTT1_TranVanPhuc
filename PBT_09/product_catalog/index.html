<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài B2 - Interactive Product Catalog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body.dark-mode { background-color: #1a202c !important; color: #fff !important; }
        body.dark-mode .card { background-color: #2d3748; border-color: #4a5568; color: #fff; }
        body.dark-mode .modal-content { background-color: #2d3748; color: #fff; }
    </style>
</head>
<body class="bg-light py-4">

    <div class="container">
        <!-- Khu vực thanh đầu trang điều khiển ứng dụng -->
        <header class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3 fw-bold m-0">Danh mục thiết bị</h1>
            <div class="d-flex gap-3 align-items-center">
                <button id="toggleDarkMode" class="btn btn-secondary btn-sm">Đổi chế độ nền</button>
                <div class="position-relativefs-4">🛒 Giỏ hàng: <span id="cartBadge" class="badge bg-danger">0</span></div>
            </div>
        </header>

        <!-- Thanh điều hướng chức năng bộ lọc và thanh kiếm tìm kiếm -->
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <input type="text" id="searchBar" class="form-control" placeholder="Tìm kiếm tên thiết bị...">
            </div>
            <div class="col-md-4">
                <div id="categoryFilters" class="btn-group w-100">
                    <button class="btn btn-outline-primary active" data-category="all">Tất cả</button>
                    <button class="btn btn-outline-primary" data-category="phone">Phone</button>
                    <button class="btn btn-outline-primary" data-category="laptop">Laptop</button>
                </div>
            </div>
            <div class="col-md-4">
                <select id="sortDropdown" class="form-select">
                    <option value="none">Sắp xếp theo...</option>
                    <option value="price-asc">Giá tăng dần</option>
                    <option value="price-desc">Giá giảm dần</option>
                </select>
            </div>
        </div>

        <!-- Vùng hiển thị lưới sản phẩm động bằng JavaScript -->
        <div id="catalogGrid" class="row row-cols-1 row-cols-md-3 g-4"></div>
    </div>

    <!-- Cửa sổ cấu trúc Modal Xem Nhanh Sản Phẩm -->
    <div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="modalTitle">Tên thiết bị</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center" id="modalBody"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="catalog.js"></script>
</body>
</html>
